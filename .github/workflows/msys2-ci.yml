name: MSYS2 CI

on:
  pull_request:
    branches: [ "*" ]
  push:
    branches: [ "*" ]

jobs:
  msys2-build-test:
    strategy:
      fail-fast: false
      matrix:
        sys: [MSYS, MINGW64, UCRT64, CLANG64]
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.sys }}
        update: true
        install: base-devel git flex bison gmp-devel
        pacboy: >-
          ${{ matrix.sys != 'MSYS' && 'cc:p' || 'gcc' }}
          meson:p
          ninja:p
          python:p
          gmp:p

    - name: Enable Windows crash dumps
      shell: pwsh
      run: |
        # Configure WER to save full dumps on crash
        $dumpDir = "${{ github.workspace }}\crashdumps"
        New-Item -Path $dumpDir -ItemType Directory -Force
        $regPath = "HKLM:\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps"
        New-Item -Path $regPath -Force
        Set-ItemProperty -Path $regPath -Name "DumpFolder" -Value $dumpDir
        Set-ItemProperty -Path $regPath -Name "DumpType" -Value 2  # Full dump
        Set-ItemProperty -Path $regPath -Name "DumpCount" -Value 10
        Write-Output "Crash dumps will be saved to $dumpDir"

    - name: Configure build
      shell: msys2 {0}
      run: meson setup builddir --buildtype=release -Dwith_gmp=enabled

    - name: Build
      shell: msys2 {0}
      run: meson compile -C builddir

    - name: Run tests
      shell: msys2 {0}
      env:
        # Meson test() sets workdir to the project source root, so this must be source-root relative.
        KGPC_CI_FAILURE_DIR: builddir/failing-tests
        # Enable verbose test logging to identify hanging tests
        KGPC_TEST_VERBOSE: "1"
      run: |
        rm -rf builddir/failing-tests failing-tests
        meson test -v -C builddir

    - name: Upload meson logs (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: meson-logs-${{ matrix.sys }}
        path: |
          builddir/meson-logs/
          builddir/failing-tests/
          builddir/debug/clang64/logs/
        if-no-files-found: ignore

    - name: Upload crash dumps
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: crash-dumps-${{ matrix.sys }}
        path: ${{ github.workspace }}/crashdumps/
        if-no-files-found: ignore
