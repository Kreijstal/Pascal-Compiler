name: Cross-Compilation CI (Wine + quasi-msys2)

on:
  pull_request:
    branches: [ "*" ]
  push:
    branches: [ "*" ]

jobs:
  cross-compile-windows:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        msystem: [UCRT64, MINGW64]
    
    steps:
    - name: Check out repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make wget tar zstd gawk gpg gpgv wine wine64 flex bison
        sudo apt-get install -y llvm clang lld
        pip install meson ninja

    - name: Clone quasi-msys2
      run: |
        git clone https://github.com/HolyBlackCat/quasi-msys2.git
        cd quasi-msys2
        echo "${{ matrix.msystem }}" > msystem.txt

    - name: Install MSYS2 packages via quasi-msys2
      run: |
        cd quasi-msys2
        # Install GCC, GMP, and other required packages
        make install _gcc _gmp _meson _ninja _python 
      timeout-minutes: 30

    - name: Configure build environment
      run: |
        cd quasi-msys2
        # Source the environment to set up cross-compilation
        bash -c 'source env/vars.src && env | grep -E "^(CC|CXX|AR|RANLIB|PKG_CONFIG|PATH|MSYSTEM)" > ../cross_env.txt'
        cat ../cross_env.txt

    - name: Configure build with Meson
      run: |
        cd quasi-msys2
        bash -c 'source env/all.src && cd .. && meson setup builddir-cross'
      continue-on-error: false

    - name: Build
      if: success()
      run: |
        cd quasi-msys2
        bash -c 'source env/all.src && cd .. && meson compile -C builddir-cross'
      continue-on-error: true

    - name: Check build outputs
      if: always()
      run: |
        echo "=== Checking for build outputs ==="
        if [ -d builddir-cross ]; then
          find builddir-cross -name "*.exe" -o -name "kgpc" | head -20
          ls -lh builddir-cross/KGPC/ || true
        else
          echo "Build directory not created"
        fi

    - name: Enable core dumps
      run: |
        ulimit -c unlimited
        # Put core dumps in a known location with the exe name
        sudo sh -c 'echo "/tmp/cores/core.%e.%p" > /proc/sys/kernel/core_pattern'
        mkdir -p /tmp/cores

    - name: Run tests with Wine
      if: success()
      env:
        KGPC_CI_FAILURE_DIR: builddir-cross/failing-tests
        KGPC_TEST_VERBOSE: "1"
        WINEDEBUG: warn+seh,warn+exception
      run: |
        ulimit -c unlimited
        cd quasi-msys2
        rm -rf ../builddir-cross/failing-tests
        # Run with verbose output to see progress
        bash -c 'source env/all.src && cd .. && meson test -C builddir-cross -v'
      timeout-minutes: 30

    - name: Collect crash backtraces
      if: failure()
      run: |
        echo "=== Checking for core dumps ==="
        ls -la /tmp/cores/ 2>/dev/null || echo "No cores directory"
        for core in /tmp/cores/core.*; do
          [ -f "$core" ] || continue
          echo "=== Backtrace from $core ==="
          # Try gdb with the cross-compiled binary
          gdb -batch -ex "thread apply all bt full" \
            builddir-cross/KGPC/kgpc.exe "$core" 2>&1 || \
          # Fallback: use x86_64-w64-mingw32-gdb or file info
          file "$core"
        done

    - name: Upload meson logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: meson-logs-cross-${{ matrix.msystem }}
        path: |
          builddir-cross/meson-logs/
          builddir-cross/failing-tests/
        if-no-files-found: ignore

    - name: Upload core dumps
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: core-dumps-cross-${{ matrix.msystem }}
        path: /tmp/cores/
        if-no-files-found: ignore

    - name: Upload cross-compiled binaries
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: kgpc-cross-${{ matrix.msystem }}
        path: |
          builddir-cross/KGPC/kgpc.exe
          builddir-cross/KGPC/kgpc
        if-no-files-found: ignore
